project:
  type: website
  output-dir: docs
  execute-dir: project
  render:
    - "*.qmd"
    - "it/*.qmd"
    - "!tasks/"
  resources:
    - "photos/"
    - "images/"

website:
  title: "Massimo Aria"
  description: "Professor of Statistics for Social Sciences — University of Naples Federico II. Bibliometrics, science mapping, machine learning."
  navbar:
    right:
      - text: About
        menu:
          - text: Short Bio
            file: shortbio.qmd
          - text: Curriculum Vitae
            file: cv.qmd
      - text: Research
        menu:
          - text: Publications
            file: publications.qmd
          - text: Projects
            file: projects.qmd
          - text: Software
            file: software.qmd
          - text: Statistics
            file: statistics.qmd
      - text: Teaching
        file: teaching.qmd
      - text: Photos
        file: photos.qmd
      - text: Contacts
        file: contacts.qmd
      - icon: book
        href: https://scholar.google.com/citations?user=Qu66YZQAAAAJ&hl=it
        aria-label: Google Scholar
      - icon: globe
        href: https://www.researchgate.net/profile/Massimo-Aria
        aria-label: ResearchGate
  page-footer:
    center: |
      Massimo Aria · Department of Economics and Statistics · University of Naples Federico II<br>
      © 2026 — Set in Crimson Pro &amp; Inter. Built with [Quarto](https://quarto.org).

format:
  html:
    theme: theme.scss
    css: styles.css
    include-in-header: lightbox-head.html
    include-after-body: lang-switch.html
    toc: true
    toc-location: left
    toc-title: "In this page"
    page-layout: full
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    link-external-icon: false
